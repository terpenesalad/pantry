// UTILITIES
// ═══════════════════════════════════════════
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-overlay').forEach(function(overlay){
  overlay.addEventListener('click', function(e){ if(e.target===overlay) overlay.classList.remove('open'); });
});

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2300);
}

// ═══════════════════════════════════════════
// PERSISTENCE — localStorage
// ═══════════════════════════════════════════
var STORAGE_KEY = 'pantry_app_v2';

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      items: items,
      categories: categories,
      recipes: recipes,
      cocktails: cocktails,
      shopList: shopList,
      nextId: nextId,
      shopNextId: shopNextId,
      recipeNextId: recipeNextId,
      cocktailNextId: cocktailNextId,
    }));
  } catch(e) { console.warn('Save failed:', e); }
}

function loadData() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    var d = JSON.parse(raw);
    if (d.items        && d.items.length)      items        = d.items;
    if (d.categories   && d.categories.length) categories   = d.categories;
    if (d.recipes      && d.recipes.length)    recipes      = d.recipes;
    if (d.cocktails    && d.cocktails.length)  cocktails    = d.cocktails;
    if (d.shopList                           ) shopList      = d.shopList;
    if (d.nextId)       nextId       = d.nextId;
    if (d.shopNextId)   shopNextId   = d.shopNextId;
    if (d.recipeNextId) recipeNextId = d.recipeNextId;
    if (d.cocktailNextId) cocktailNextId = d.cocktailNextId;
  } catch(e) { console.warn('Load failed:', e); }
}

// Wrap all mutating functions to auto-save after every change
var _origSaveItem = saveItem;
saveItem = function() { _origSaveItem(); saveData(); };

var _origDeleteItem = deleteCurrentItem;
deleteCurrentItem = function() { _origDeleteItem(); saveData(); };

var _origAddCat = addCategory;
addCategory = function() { _origAddCat(); saveData(); };

var _origSaveEditCat = saveEditCat;
saveEditCat = function() { _origSaveEditCat(); saveData(); };

var _origDeleteCat = deleteCategory;
deleteCategory = function() { _origDeleteCat(); saveData(); };

var _origAddCustomShop = addCustomShopItem;
addCustomShopItem = function() { _origAddCustomShop(); saveData(); };

var _origClearChecked = clearChecked;
clearChecked = function() { _origClearChecked(); saveData(); };

var _origToggleShop = toggleShopItem;
toggleShopItem = function(id) { _origToggleShop(id); saveData(); };

var _origAdjustQty = adjustQty;
adjustQty = function(id, delta) { _origAdjustQty(id, delta); saveData(); };

var _origRemoveShopItem = removeShopItem;
removeShopItem = function(id) { _origRemoveShopItem(id); saveData(); };

var _origAddToShop = addToShopFromPantry;
addToShopFromPantry = function(id) { _origAddToShop(id); saveData(); };

var _origRemoveFromShop = removeFromShopBySource;
removeFromShopBySource = function(id) { _origRemoveFromShop(id); saveData(); };

var _origAutoAdd = autoAddLowStock;
autoAddLowStock = function() { _origAutoAdd(); saveData(); };

var _origSaveRecipe = saveRecipe;
saveRecipe = function() { _origSaveRecipe(); saveData(); };

var _origDeleteRecipe = deleteCurrentRecipe;
deleteCurrentRecipe = function() { _origDeleteRecipe(); saveData(); };

var _origAddRecipeToShop = addRecipeToShop;
addRecipeToShop = function(id) { _origAddRecipeToShop(id); saveData(); };

// INIT
loadData();

// Check for incoming share BEFORE first render so we can land on the right tab
var _shareParams = new URLSearchParams(window.location.search);
var _shareEncoded = _shareParams.get('share');
if (_shareEncoded) {
  // Wipe immediately so refresh won't re-trigger
  history.replaceState(null, '', window.location.pathname);
  // Decode and stash the payload now, synchronously
  try {
    var _b64 = _shareEncoded.replace(/-/g,'+').replace(/_/g,'/');
    while (_b64.length % 4) _b64 += '=';
    var _binary = atob(_b64);
    var _bytes = new Uint8Array(_binary.length);
    for (var _i = 0; _i < _binary.length; _i++) _bytes[_i] = _binary.charCodeAt(_i);
    var _json = new TextDecoder('utf-8').decode(_bytes);
    pendingImport = JSON.parse(_json);
  } catch(_e) {
    pendingImport = null;
    console.warn('Share decode error:', _e);
  }
}

// If we have a valid pending import, switch to the right tab before rendering
if (pendingImport && pendingImport.type) {
  var _startTab = pendingImport.type === 'cocktail' ? 'cocktails' : 'recipes';
  // Patch the tabMap manually before switchTab exists fully — just set active classes
  ['pagePantry','pageShop','pageRecipes','pageCocktails'].forEach(function(p){ 
    var el = document.getElementById(p); if(el) el.classList.remove('active'); 
  });
  ['tabPantry','tabShop','tabRecipes','tabCocktails'].forEach(function(t){ 
    var el = document.getElementById(t); if(el) el.classList.remove('active'); 
  });
  var _startPage = pendingImport.type === 'cocktail' ? 'pageCocktails' : 'pageRecipes';
  var _startNav  = pendingImport.type === 'cocktail' ? 'tabCocktails'  : 'tabRecipes';
  var _pg = document.getElementById(_startPage); if(_pg) _pg.classList.add('active');
  var _nv = document.getElementById(_startNav);  if(_nv) _nv.classList.add('active');
}

renderAll();
updateShopBadge();

// Now show the import modal — DOM is fully ready
if (pendingImport && pendingImport.type && pendingImport.data) {
  var _d = pendingImport.data;
  var _typeLabel = pendingImport.type === 'recipe' ? 'Recipe' : 'Cocktail';

  var _meta = [];
  if (_d.cuisine)    _meta.push(_d.cuisine);
  if (_d.style)      _meta.push(_d.style);
  if (_d.time)       _meta.push(_d.time);
  if (_d.serves)     _meta.push('Serves ' + _d.serves);
  if (_d.difficulty) _meta.push(_d.difficulty);

  var _preview = '<strong style="color:var(--accent);font-size:18px;font-weight:700">' + _d.name + '</strong>';
  if (_meta.length) _preview += '<div style="margin:8px 0 12px;color:var(--text3);font-size:12px">' + _meta.join(' &middot; ') + '</div>';
  if (_d.desc) _preview += '<div style="margin-bottom:12px;color:var(--text2);font-size:14px;line-height:1.5">' + _d.desc + '</div>';
  _preview += '<div style="color:var(--text3);font-size:12px">' +
    (_d.ingredients ? _d.ingredients.length : 0) + ' ingredients &middot; ' +
    (_d.steps ? _d.steps.length : 0) + ' steps</div>';

  document.getElementById('importModalTitle').textContent = 'Incoming ' + _typeLabel;
  document.getElementById('importModalBody').innerHTML = _preview;
  openModal('importModal');
} else if (_shareEncoded && !pendingImport) {
  showToast('Could not read shared recipe — link may be invalid');
}
